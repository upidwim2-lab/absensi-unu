<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIAKAD — Absensi UNU Al-Ghozali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400&family=Fira+Code:wght@400&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --forest-dark: #0d1310; --forest-mid: #1a2420; --off-white: #f4f4f4; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--forest-dark); color: var(--off-white); line-height: 1.7; }
.container { max-width: 1000px; margin: 0 auto; padding: 0 2rem; }
.section { padding: 6rem 0; }
.header { padding: 4rem 0 2rem; text-align: center; background: var(--forest-mid); }
.header h1 { font-family: 'EB Garamond', serif; font-size: 2.5rem; font-weight: 400; margin-bottom: 0.5rem; }
.header p { opacity: 0.7; font-size: 0.9rem; }
.auth-box { max-width: 450px; margin: 3rem auto; background: var(--forest-mid); padding: 2.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
.tabs { display: flex; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
.tab { flex: 1; background: none; border: none; color: var(--off-white); padding: 1rem 0; font-family: 'EB Garamond', serif; font-size: 1.2rem; cursor: pointer; opacity: 0.4; border-bottom: 2px solid transparent; }
.tab.active { opacity: 1; border-bottom-color: var(--off-white); }
.form-group { margin-bottom: 1.5rem; display: none; }
.form-group.active { display: block; }
label { display: block; font-family: 'Fira Code', monospace; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6; margin-bottom: 0.5rem; }
input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 0.7rem 0; color: var(--off-white); font-size: 1rem; }
input:focus { outline: none; border-bottom-color: var(--off-white); }
button.submit-btn { width: 100%; padding: 1rem; background: var(--off-white); color: var(--forest-dark); border: none; border-radius: 999px; font-size: 0.9rem; cursor: pointer; margin-top: 1rem; font-weight: 500; }
button.submit-btn:hover { background: #fff; }
.msg { padding: 0.8rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.85rem; display: none; }
.msg.error { background: rgba(255,100,100,0.1); color: #ff6b6b; border: 1px solid rgba(255,100,100,0.3); display: block; }
.msg.success { background: rgba(100,255,100,0.1); color: #6bff6b; border: 1px solid rgba(100,255,100,0.3); display: block; }
.dashboard { display: none; padding: 4rem 0; }
.dashboard.active { display: block; }
.topbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; margin-bottom: 2rem; }
.logout-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: var(--off-white); padding: 0.5rem 1rem; border-radius: 999px; cursor: pointer; }
.card { background: var(--forest-mid); padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
.card h3 { font-family: 'EB Garamond', serif; font-size: 1.2rem; font-weight: 400; }
.absen-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: var(--off-white); padding: 0.5rem 1rem; border-radius: 999px; cursor: pointer; font-size: 0.8rem; }
.absen-btn.done { background: rgba(100,255,100,0.2); border-color: rgba(100,255,100,0.5); color: #6bff6b; }
</style>
</head>
<body>

<header class="header">
  <div class="container">
    <h1>Absensi UNU Al-Ghozali</h1>
    <p>Sistem Informasi Akademik Mahasiswa</p>
  </div>
</header>

<div class="container">
  <!-- BAGIAN LOGIN & DAFTAR -->
  <div id="auth-section" class="section">
    <div class="auth-box">
      <div class="msg" id="auth-msg"></div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Masuk</button>
        <button class="tab" onclick="switchTab('signup')">Daftar</button>
      </div>

      <form id="login-form" class="form-group active" onsubmit="handleLogin(event)">
        <div style="margin-bottom: 1rem;">
          <label>Email</label>
          <input type="email" id="login-email" required>
        </div>
        <div style="margin-bottom: 1rem;">
          <label>Password</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="submit-btn">Masuk</button>
      </form>

      <form id="signup-form" class="form-group" onsubmit="handleSignup(event)">
        <div style="margin-bottom: 1rem;">
          <label>Nama Lengkap</label>
          <input type="text" id="signup-nama" required>
        </div>
        <div style="margin-bottom: 1rem;">
          <label>NIM</label>
          <input type="text" id="signup-nim" required>
        </div>
        <div style="margin-bottom: 1rem;">
          <label>Email</label>
          <input type="email" id="signup-email" required>
        </div>
        <div style="margin-bottom: 1rem;">
          <label>Password (min. 6 karakter)</label>
          <input type="password" id="signup-password" required>
        </div>
        <button type="submit" class="submit-btn">Daftar Sekarang</button>
      </form>
    </div>
  </div>

  <!-- BAGIAN DASHBOARD ABSENSI -->
  <div id="dashboard-section" class="dashboard">
    <div class="topbar">
      <div>
        <h2 id="user-greeting" style="font-family: 'EB Garamond', serif; font-weight: 400; font-size: 1.8rem;">Halo, Mahasiswa</h2>
        <p id="user-nim" style="font-family: 'Fira Code', monospace; font-size: 0.8rem; opacity: 0.6; margin-top: 0.3rem;"></p>
      </div>
      <button class="logout-btn" onclick="handleLogout()">Keluar</button>
    </div>

    <h3 style="font-family: 'EB Garamond', serif; font-size: 1.5rem; margin-bottom: 1.5rem;">Jadwal & Absensi Hari Ini</h3>
    
    <div class="card">
      <div>
        <h3>Fiqih Muamalah</h3>
        <p style="font-size: 0.85rem; opacity: 0.7;">07:30 - 09:00 | Dr. H. Ahmad Fauzi</p>
      </div>
      <button class="absen-btn" onclick="absen(this, 'Fiqih Muamalah')">Tandai Hadir</button>
    </div>

    <div class="card">
      <div>
        <h3>Ushul Fiqih</h3>
        <p style="font-size: 0.85rem; opacity: 0.7;">09:15 - 10:45 | Prof. Dr. Hj. Siti Aminah</p>
      </div>
      <button class="absen-btn" onclick="absen(this, 'Ushul Fiqih')">Tandai Hadir</button>
    </div>

    <div class="card">
      <div>
        <h3>Studi Hadits</h3>
        <p style="font-size: 0.85rem; opacity: 0.7;">13:00 - 14:30 | Dr. H. Muhammad Ridwan</p>
      </div>
      <button class="absen-btn" onclick="absen(this, 'Studi Hadits')">Tandai Hadir</button>
    </div>
  </div>
</div>

<script>
// === PASTE URL DAN ANON KEY SUPABASE ANDA DI BAWAH INI ===
const SUPABASE_URL = 'PASTE_URL_SUPABASE_ANDA_DISINI';
const SUPABASE_KEY = 'PASTE_ANON_KEY_ANDA_DISINI';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-group').forEach(f => f.classList.remove('active'));
  if (tab === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('login-form').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('signup-form').classList.add('active');
  }
}

function showMsg(type, text) {
  const msg = document.getElementById('auth-msg');
  msg.className = 'msg ' + type;
  msg.textContent = text;
}

async function handleSignup(e) {
  e.preventDefault();
  const nama = document.getElementById('signup-nama').value;
  const nim = document.getElementById('signup-nim').value;
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;

  const { data, error } = await supabase.auth.signUp({
    email, password,
    options: { data: { nama, nim } }
  });

  if (error) {
    showMsg('error', error.message);
  } else {
    showMsg('success', 'Pendaftaran berhasil! Cek email Anda untuk verifikasi, lalu masuk.');
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg('error', 'Email atau password salah!');
  } else {
    enterDashboard(data.user);
  }
}

async function enterDashboard(user) {
  const nama = user.user_metadata?.nama || 'Mahasiswa';
  const nim = user.user_metadata?.nim || '-';
  
  document.getElementById('user-greeting').textContent = 'Halo, ' + nama;
  document.getElementById('user-nim').textContent = 'NIM: ' + nim;
  
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('dashboard-section').classList.add('active');
}

async function handleLogout() {
  await supabase.auth.signOut();
  document.getElementById('dashboard-section').classList.remove('active');
  document.getElementById('auth-section').style.display = 'block';
  switchTab('login');
}

async function absen(btn, courseName) {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return;

  const nama = user.user_metadata?.nama || 'Mahasiswa';
  const { error } = await supabase
    .from('attendance')
    .insert([{ user_id: user.id, student_name: nama, course_name: courseName, status: 'hadir' }]);

  if (error) {
    alert('Gagal absen: ' + error.message);
  } else {
    btn.textContent = '✓ Tercatat';
    btn.classList.add('done');
    btn.disabled = true;
    alert('Berhasil absen untuk mata kuliah ' + courseName);
  }
}

// Cek sesi login saat halaman dimuat
window.addEventListener('load', async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session && session.user) {
    enterDashboard(session.user);
  }
});
</script>
</body>
</html>
